<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Juste Prix — Difficile</title>
</head>
<body>
    <button class="back-button" id="back-btn" aria-label="Retour">← </button>
    <header class="hero">
        <div class="container">
            <h1>Jeu du Juste Prix — Difficile</h1>
            <p class="hero-sub">Devine le prix secret entre 1 et 1000. Tu as 10 essais.</p>
        </div>
    </header>

    <main class="container">
        <section id="game">
            <div class="contact-card game-card">
                <div class="game-panel">
                    <p class="game-instructions">Entre un nombre, puis valide pour savoir si c'est trop bas, trop haut ou juste.</p>
                    <form id="guess-form" class="form-flex">
                        <div>
                            <label for="guess">Ton estimation :</label>
                            <input type="number" id="guess" name="guess" min="1" max="1000" required placeholder="1 - 1000">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Valider</button>
                        </div>
                    </form>
                    <div class="game-status" id="game-message">Prêt ? Fais ta première proposition.</div>
                    <div class="game-meta">
                        <span id="attempts-count">Essais restants : 10</span>
                        <button type="button" id="reset-button" class="btn-secondary">Nouvelle partie</button>
                    </div>
                </div>
                <aside class="guess-history" aria-labelledby="guess-history-title">
                    <h2 id="guess-history-title">Numéros déjà essayés</h2>
                    <p id="guess-history-empty">Aucun essai encore.</p>
                    <ul id="guess-history-list" class="guess-history-list" aria-live="polite"></ul>
                </aside>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Vitrine Optimale</p>
        </div>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
